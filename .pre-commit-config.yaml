repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        exclude: ^tests/
        additional_dependencies:
          - pydantic>=2.0.0
          - boto3-stubs[ec2,cloudwatch,ce,pricing]>=1.35.0
          - typer>=0.15.0
          - httpx>=0.27.0
          - rich>=13.0.0
          - pyyaml>=6.0
          - types-PyYAML>=6.0
          - "mcp[cli]>=1.0.0"
          - fastapi>=0.115.0
        args: [--strict]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: .venv/bin/pytest -x -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
